name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  sync-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          python -m pip check

      - name: Run checks
        env:
          ENVIRONMENT: test
          SYNC_API_KEY: test-sync-key
        run: |
          python -m ruff check .
          python -m pytest
