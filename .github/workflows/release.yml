name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_only:
        description: Build the container image without publishing a GitHub Release or pushing to GHCR
        required: false
        default: false
        type: boolean
      force_publish_existing:
        description: Push containers for an existing release version without creating a new GitHub release
        required: false
        default: false
        type: boolean
      release_version:
        description: Existing release version without leading v (required when force_publish_existing is true)
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Read sync package version
        id: package_version
        shell: bash
        run: |
          version="$(python -c "from pathlib import Path; import re; match = re.search(r'^version = \"([^\"]+)\"', Path('pyproject.toml').read_text(encoding='utf-8'), re.MULTILINE); print(match.group(1) if match else '')")"
          if [ -z "$version" ]; then
            echo "::error title=Missing pyproject version::Could not read version from pyproject.toml"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Preview release version
        id: semantic_preview
        uses: cycjimmy/semantic-release-action@v6
        with:
          dry_run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify sync package version matches release version
        if: steps.semantic_preview.outputs.new_release_published == 'true' && !inputs.build_only && !inputs.force_publish_existing && github.event_name != 'release'
        shell: bash
        run: |
          expected="${{ steps.semantic_preview.outputs.new_release_version }}"
          actual="${{ steps.package_version.outputs.version }}"
          if [ "$actual" != "$expected" ]; then
            echo "::error title=pyproject.toml version mismatch::pyproject.toml is $actual but semantic-release plans $expected. Update pyproject.toml before running the release workflow."
            exit 1
          fi

      - name: Resolve release mode
        id: release_mode
        shell: bash
        run: |
          if [ "${{ inputs.build_only }}" = "true" ]; then
            echo "build_requested=true" >> "$GITHUB_OUTPUT"
            echo "publish_release=false" >> "$GITHUB_OUTPUT"
            echo "image_tag=build-only-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.force_publish_existing }}" = "true" ]; then
            version="${{ inputs.release_version }}"
            if [ -z "$version" ]; then
              echo "::error title=Missing release version::Set release_version when force_publish_existing is true."
              exit 1
            fi
            echo "build_requested=true" >> "$GITHUB_OUTPUT"
            echo "publish_release=true" >> "$GITHUB_OUTPUT"
            echo "image_tag=$version" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "release" ] && [ "${{ github.event.action }}" = "published" ]; then
            tag="${{ github.event.release.tag_name }}"
            version="${tag#v}"
            if [ -z "$version" ]; then
              echo "::error title=Missing release tag::Could not resolve version from release tag."
              exit 1
            fi
            echo "build_requested=true" >> "$GITHUB_OUTPUT"
            echo "publish_release=true" >> "$GITHUB_OUTPUT"
            echo "image_tag=$version" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.semantic_preview.outputs.new_release_published }}" = "true" ]; then
            echo "build_requested=true" >> "$GITHUB_OUTPUT"
            echo "publish_release=true" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ steps.semantic_preview.outputs.new_release_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "build_requested=false" >> "$GITHUB_OUTPUT"
            echo "publish_release=false" >> "$GITHUB_OUTPUT"
            echo "image_tag=build-only-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Set up QEMU
        if: steps.release_mode.outputs.build_requested == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        if: steps.release_mode.outputs.build_requested == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: steps.release_mode.outputs.publish_release == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: steps.release_mode.outputs.build_requested == 'true'
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ steps.release_mode.outputs.publish_release == 'true' }}
            type=raw,value=${{ steps.release_mode.outputs.image_tag }}

      - name: Build and push container image
        if: steps.release_mode.outputs.build_requested == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ steps.release_mode.outputs.publish_release == 'true' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

      - name: Release
        if: steps.release_mode.outputs.publish_release == 'true' && !inputs.force_publish_existing && github.event_name != 'release'
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No release needed
        if: steps.release_mode.outputs.build_requested != 'true'
        run: echo "No releasable changes detected."